        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

                    <span class="block text-xs mt-0.5 ${index === activeTab ? 'text-blue-500' : 'text-slate-400'}">${phrase.translation}</span>
                </button>
            `).join('');
        }

                        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">✍️ Exercício Prático</p>
                        <div class="bg-slate-50 rounded-xl p-4 mb-4">
                            <p class="text-sm font-semibold text-slate-700 mb-1">📌 Situação:</p>
                            <p class="text-slate-600">${phrase.exerciseSituation}</p>
                        </div>
                        <p class="font-bold text-slate-800 mb-1">${phrase.exerciseQuestionFr}</p>
                        <p class="text-slate-500 text-sm mb-4 italic">(${phrase.exerciseQuestionPt})</p>
                        <input 
                            type="text" 
                            id="exercise-input" 
                            class="w-full p-3 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-500 mb-3 text-slate-800 text-lg" 
                            placeholder="Digite sua resposta em francês...">
                        <button 
                            onclick="checkAnswer(${activeTab})" 
                            class="w-full px-6 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">
                            Verificar Resposta
                        </button>
                        <div id="exercise-feedback" class="mt-3 p-3 rounded-xl border-2 hidden"></div>
                    </div>
                </div>
            `;
        }

        function selectTab(index) {
            activeTab = index;
            renderTabs();
            renderContent();
            document.getElementById('content-display').scrollTop = 0;
            // Scroll tab into view
            const tabContainer = document.getElementById('tab-container');
            const buttons = tabContainer.querySelectorAll('button');
            if (buttons[index]) {
                buttons[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function navigate(direction) {
            const newIndex = activeTab + direction;
            if (newIndex >= 0 && newIndex < phrasesData.length) {
                selectTab(newIndex);
            }
        }

        function checkAnswer(tabIndex) {
            const input = document.getElementById('exercise-input');
            const feedback = document.getElementById('exercise-feedback');
            if (!input || !feedback) return;

            const userAnswer = input.value.trim().toLowerCase();
            const phrase = phrasesData[tabIndex];
            const correctAnswers = phrase.exerciseCorrectAnswer.map(a => a.toLowerCase().trim());

            feedback.classList.remove('hidden', 'correct-answer', 'incorrect-answer');
            input.classList.remove('correct-answer', 'incorrect-answer');

            if (correctAnswers.includes(userAnswer)) {
                feedback.classList.add('correct-answer');
                input.classList.add('correct-answer');
                feedback.innerHTML = '✅ <span class="font-bold text-green-800">Correto! Muito bem!</span>';
            } else {
                feedback.classList.add('incorrect-answer');
                input.classList.add('incorrect-answer');
                feedback.innerHTML = `❌ <span class="font-bold text-red-800">Não exatamente.</span> Uma resposta esperada: <span class="font-mono font-bold text-red-700">"${phrase.exerciseCorrectAnswer[0]}"</span>`;
            }
        }

        // ============================
        // EXERCÍCIOS FINAIS
        // ============================

        const translationData = phrasesData
            .filter(p => !p.isExerciseTab)
            .map(p => ({
                portuguese: p.translation,
                french: p.exerciseCorrectAnswer
            }));

        let currentTranslationIndex = 0;
        let shuffledTranslationData = [];

        function renderFinalExercises() {
            return `
                <div class="space-y-6">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">🎯 Exercícios Finais</h2>
                        <p class="text-slate-500 mt-1">Teste o que você aprendeu com este exercício de tradução.</p>
                    </div>

                    <div class="bg-white border-2 border-slate-200 rounded-2xl p-6">
                        <h3 class="text-xl font-bold text-slate-800 mb-2">📝 Tradução: Português → Francês</h3>
                        <p class="text-slate-500 mb-6 text-sm">Leia a situação em português e escreva a expressão correta em francês.</p>

                        <div id="translation-progress" class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4"></div>

                        <div id="translation-question-box" class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4">
                            <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">🇧🇷 Expressão em Português</p>
                            <p id="translation-question" class="text-2xl font-black text-blue-900"></p>
                        </div>

                        <input 
                            type="text" 
                            id="translation-input" 
                            class="w-full p-3 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-500 mb-3 text-slate-800 text-lg" 
                            placeholder="Escreva a expressão em francês..."
                            onkeydown="if(event.key==='Enter') checkTranslationAnswer()">

                        <div class="flex gap-3">
                            <button 
                                onclick="checkTranslationAnswer()" 
                                class="flex-1 px-6 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">
                                ✅ Verificar
                            </button>
                            <button 
                                onclick="nextTranslationQuestion()" 
                                class="flex-1 px-6 py-3 rounded-xl bg-slate-700 text-white font-bold hover:bg-slate-800 transition-colors">
                                ➡️ Próxima
                            </button>
                        </div>

                        <div id="translation-feedback" class="mt-4 p-4 rounded-xl border-2 hidden text-base"></div>
                    </div>
                </div>
            `;
        }

        function initTranslationExercise() {
            shuffledTranslationData = shuffleArray(translationData);
            currentTranslationIndex = 0;
            showTranslationQuestion();
        }

        function showTranslationQuestion() {
            const qEl = document.getElementById('translation-question');
            const iEl = document.getElementById('translation-input');
            const fEl = document.getElementById('translation-feedback');
            const pEl = document.getElementById('translation-progress');

            if (!qEl || !iEl || !fEl) return;

            const current = shuffledTranslationData[currentTranslationIndex];
            qEl.textContent = current.portuguese;
            iEl.value = '';
            iEl.classList.remove('correct-answer', 'incorrect-answer');
            iEl.focus();
            fEl.classList.add('hidden');
            fEl.innerHTML = '';

            if (pEl) {
                pEl.textContent = `Questão ${currentTranslationIndex + 1} de ${shuffledTranslationData.length}`;
            }
        }

        function checkTranslationAnswer() {
            const iEl = document.getElementById('translation-input');
            const fEl = document.getElementById('translation-feedback');
            if (!iEl || !fEl) return;

            const userAnswer = iEl.value.trim().toLowerCase();
            const current = shuffledTranslationData[currentTranslationIndex];
            const correctAnswers = current.french.map(a => a.toLowerCase().trim());

            fEl.classList.remove('hidden', 'correct-answer', 'incorrect-answer');
            iEl.classList.remove('correct-answer', 'incorrect-answer');

            if (correctAnswers.includes(userAnswer)) {
                fEl.classList.add('correct-answer');
                iEl.classList.add('correct-answer');
                fEl.innerHTML = '✅ <span class="font-bold text-green-800">Correto! Excelente!</span>';
            } else {
                fEl.classList.add('incorrect-answer');
                iEl.classList.add('incorrect-answer');
                fEl.innerHTML = `❌ <span class="font-bold text-red-800">Não exatamente.</span> Uma resposta esperada: <span class="font-mono font-bold text-red-700">"${current.french[0]}"</span>`;
            }
        }

        function nextTranslationQuestion() {
            currentTranslationIndex = (currentTranslationIndex + 1) % shuffledTranslationData.length;
            showTranslationQuestion();
        }

        // ============================
        // INICIALIZAÇÃO
        // ============================
        window.onload = function() {
            activeTab = 0;
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
