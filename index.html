        function selectTab(index) {
            activeTab = index;
            renderTabs();
            renderContent();

        // Função para verificar a resposta do exercício individual
        function checkExerciseAnswer(tabIndex) {
            const phrase = phrasesData[tabIndex];
            const inputElement = document.getElementById('exercise-input');
            const feedbackElement = document.getElementById('exercise-feedback');

            if (!inputElement || !feedbackElement) return;

            const userAnswer = inputElement.value.trim().toLowerCase();
            const correctAnswers = phrase.exerciseCorrectAnswer.map(ans => ans.toLowerCase());

            feedbackElement.classList.remove('hidden', 'correct-answer', 'incorrect-answer');
            inputElement.classList.remove('correct-answer', 'incorrect-answer');

            if (correctAnswers.includes(userAnswer)) {
                feedbackElement.classList.add('correct-answer');
                inputElement.classList.add('correct-answer');
                feedbackElement.innerHTML = '<span class="font-bold text-green-800">Correto!</span> Muito bem!';

                feedbackElement.classList.add('incorrect-answer');
                inputElement.classList.add('incorrect-answer');
                feedbackElement.innerHTML = `<span class="font-bold text-red-800">Incorreto.</span> Uma resposta esperada era: <span class="font-mono font-bold">${phrase.exerciseCorrectAnswer[0]}</span>`;

        }

        // ====================================================================================================
        // EXERCÍCIOS FINAIS
        // ====================================================================================================

        // Dados para o exercício de Correspondência
        // CORREÇÃO AQUI: Usar 'writing' para o francês, que é a forma padrão
        const matchingData = phrasesData.filter(p => !p.isExerciseTab).map(p => ({
            french: p.writing, // Usar a escrita padrão para o matching
            portuguese: p.translation
        }));

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function renderMatchingExercise() {
            // Embaralha os pares para garantir que não estejam na ordem original
            const shuffledPairs = shuffleArray([...matchingData]);
            const shuffledFrench = shuffleArray(shuffledPairs.map(item => item.french));
            const shuffledPortuguese = shuffleArray(shuffledPairs.map(item => item.portuguese));

            let html = `
                <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200 border border-slate-100">
                    <h3 class="text-2xl font-bold text-slate-800 mb-4">Exercício de Correspondência</h3>
                    <p class="text-slate-600 mb-6">Arraste as expressões em francês para suas traduções corretas em português.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div id="matching-sources" class="matching-source-container">
                            ${shuffledFrench.map((french, index) => `<div class="matching-source-item" draggable="true" id="source-${index}" data-french="${french}">${french}</div>`).join('')}
                        </div>
                        <div id="matching-targets">
                            ${shuffledPortuguese.map((portuguese, index) => `<div class="matching-target" id="target-${index}" data-portuguese="${portuguese}">Arrastar aqui</div>`).join('')}
                        </div>
                    </div>
                    <button onclick="checkMatchingExercise()" class="mt-8 px-6 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">Verificar Correspondência</button>
                    <button onclick="resetMatchingExercise()" class="mt-8 ml-4 px-6 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-colors">Reiniciar</button>
                    <div id="matching-feedback" class="mt-4 p-3 rounded-lg border-2 hidden"></div>
                </div>
            `;
            return html;
        }

        let draggedItem = null;

        function initializeMatchingExercise() {
            const sources = document.querySelectorAll('.matching-source-item');
            const targets = document.querySelectorAll('.matching-target');

            sources.forEach(source => {
                source.addEventListener('dragstart', (e) => {
                    draggedItem = source;
                    e.dataTransfer.setData('text/plain', source.dataset.french);
                    source.classList.add('dragging');
                });
                source.addEventListener('dragend', () => {
                    draggedItem.classList.remove('dragging');
                    draggedItem = null;
                });
            });

            targets.forEach(target => {
                target.addEventListener('dragover', (e) => {
                    e.preventDefault(); // Permite o drop
                    target.classList.add('border-blue-500'); // Feedback visual
                });
                target.addEventListener('dragleave', (e) => {
                    target.classList.remove('border-blue-500');
                });
                target.addEventListener('drop', (e) => {
                    e.preventDefault();
                    target.classList.remove('border-blue-500');

                    if (draggedItem && !target.querySelector('.matching-dropped-item')) { // Só permite drop se o target estiver vazio
                        target.innerHTML = ''; // Limpa o texto "Arrastar aqui"
                        target.appendChild(draggedItem);
                        draggedItem.style.position = 'static'; // Remove qualquer posicionamento de arrasto
                        draggedItem.style.margin = '0'; // Remove margens extras
                        draggedItem.classList.remove('matching-source-item'); // Remove estilo de item de origem
                        draggedItem.classList.add('matching-dropped-item'); // Adiciona estilo de item dropado
                        target.classList.add('has-item');
                    }
                });
            });
        }

        function checkMatchingExercise() {
            const targets = document.querySelectorAll('.matching-target');
            let allCorrect = true;
            let correctCount = 0;

            targets.forEach(target => {
                target.classList.remove('correct', 'incorrect');
                const droppedItem = target.querySelector('.matching-dropped-item');
                if (droppedItem) {
                    const frenchText = droppedItem.dataset.french;
                    const portugueseText = target.dataset.portuguese;

                    // CORREÇÃO AQUI: A comparação agora é direta entre o francês arrastado e o português do alvo
                    const isCorrectMatch = matchingData.some(item => item.french === frenchText && item.portuguese === portugueseText);

                    if (isCorrectMatch) {
                        target.classList.add('correct');
                        correctCount++;
                    } else {
                        target.classList.add('incorrect');
                        allCorrect = false;
                    }
                } else {
                    allCorrect = false; // Se um target estiver vazio, não está completo
                }
            });

            const feedbackElement = document.getElementById('matching-feedback');
            feedbackElement.classList.remove('hidden', 'correct-answer', 'incorrect-answer');

            if (allCorrect && correctCount === matchingData.length) {
                feedbackElement.classList.add('correct-answer');
                feedbackElement.innerHTML = '<span class="font-bold text-green-800">Parabéns!</span> Todas as correspondências estão corretas!';
            } else {
                feedbackElement.classList.add('incorrect-answer');
                feedbackElement.innerHTML = `<span class="font-bold text-red-800">Quase lá!</span> Você acertou ${correctCount} de ${matchingData.length}. Revise e tente novamente.`;
            }
        }

        function resetMatchingExercise() {
            const sourcesContainer = document.getElementById('matching-sources');
            const targetsContainer = document.getElementById('matching-targets');
            const feedbackElement = document.getElementById('matching-feedback');

            // Limpa feedback
            feedbackElement.classList.add('hidden');
            feedbackElement.innerHTML = '';

            // Move todos os itens de volta para as fontes
            targetsContainer.querySelectorAll('.matching-target').forEach(target => {
                const droppedItem = target.querySelector('.matching-dropped-item');
                if (droppedItem) {
                    droppedItem.classList.remove('matching-dropped-item');
                    droppedItem.classList.add('matching-source-item');
                    sourcesContainer.appendChild(droppedItem);
                }
                target.innerHTML = 'Arrastar aqui'; // Restaura o texto padrão
                target.classList.remove('has-item', 'correct', 'incorrect');
            });

            // Re-renderiza para embaralhar as fontes novamente
            sourcesContainer.innerHTML = ''; // Limpa o container de fontes
            const shuffledFrench = shuffleArray(matchingData.map(item => item.french));
            sourcesContainer.innerHTML = shuffledFrench.map((french, index) => `<div class="matching-source-item" draggable="true" id="source-${index}" data-french="${french}">${french}</div>`).join('');

            initializeMatchingExercise(); // Re-inicializa os listeners de drag/drop
        }

        // Dados para o exercício de Tradução
        const translationData = phrasesData.filter(p => !p.isExerciseTab).map(p => ({
            portuguese: p.translation,
            french: p.exerciseCorrectAnswer // Usar as respostas corretas do exercício individual
        }));

        let currentTranslationIndex = 0;
        let shuffledTranslationData = [];

        function renderTranslationExercise() {
            let html = `
                <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200 border border-slate-100">
                    <h3 class="text-2xl font-bold text-slate-800 mb-4">Exercício de Tradução (Português para Francês)</h3>
                    <p class="text-slate-600 mb-6">Traduza a frase abaixo para o francês.</p>
                    <div id="translation-question" class="text-xl font-bold text-slate-800 mb-4"></div>
                    <input type="text" id="translation-input" class="w-full p-3 border-2 border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 mb-4 text-slate-800" placeholder="Sua tradução em francês...">
                    <button onclick="checkTranslationAnswer()" class="px-6 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">Verificar Tradução</button>
                    <button onclick="nextTranslationQuestion()" class="ml-4 px-6 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-colors">Próxima Frase</button>
                    <div id="translation-feedback" class="mt-4 p-3 rounded-lg border-2 hidden"></div>
                </div>
            `;
            return html;
        }

        function initializeTranslationExercise() {
            shuffledTranslationData = shuffleArray([...translationData]); // Cria uma cópia e embaralha
            currentTranslationIndex = 0;
            displayTranslationQuestion();
        }

        function displayTranslationQuestion() {
            const questionElement = document.getElementById('translation-question');
            const inputElement = document.getElementById('translation-input');
            const feedbackElement = document.getElementById('translation-feedback');

            if (shuffledTranslationData.length === 0) {
                questionElement.innerText = "Nenhuma frase para traduzir.";
                inputElement.disabled = true;
                return;
            }

            const currentPhrase = shuffledTranslationData[currentTranslationIndex];
            questionElement.innerText = currentPhrase.portuguese;
            inputElement.value = '';
            inputElement.classList.remove('correct-answer', 'incorrect-answer');
            feedbackElement.classList.add('hidden');
            feedbackElement.innerHTML = '';
            inputElement.disabled = false;
        }

        function checkTranslationAnswer() {
            const inputElement = document.getElementById('translation-input');
            const feedbackElement = document.getElementById('translation-feedback');

            if (!inputElement || !feedbackElement || shuffledTranslationData.length === 0) return;

            const userAnswer = inputElement.value.trim().toLowerCase();
            const currentPhrase = shuffledTranslationData[currentTranslationIndex];
            const correctAnswers = currentPhrase.french.map(ans => ans.toLowerCase());

            feedbackElement.classList.remove('hidden', 'correct-answer', 'incorrect-answer');
            inputElement.classList.remove('correct-answer', 'incorrect-answer');

            if (correctAnswers.some(correct => userAnswer === correct)) { // Usa .some para verificar se a resposta do usuário corresponde a *qualquer* resposta correta
                feedbackElement.classList.add('correct-answer');
                inputElement.classList.add('correct-answer');
                feedbackElement.innerHTML = '<span class="font-bold text-green-800">Correto!</span> Muito bem!';
            } else {
                feedbackElement.classList.add('incorrect-answer');
                inputElement.classList.add('incorrect-answer');
                feedbackElement.innerHTML = `<span class="font-bold text-red-800">Incorreto.</span> Uma resposta esperada era: <span class="font-mono font-bold">${currentPhrase.french[0]}</span>`;
            }
        }

        function nextTranslationQuestion() {
            currentTranslationIndex = (currentTranslationIndex + 1) % shuffledTranslationData.length;
            displayTranslationQuestion();
        }

        // Inicialização
        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
